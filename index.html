<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Calculator V2</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f0f0f0;
font-family:Arial;
transition:0.3s;
}

body.dark{
background:#121212;
}

.calculator{
background:#222;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #00000060;
}

.display{
width:100%;
height:70px;
font-size:2em;
text-align:right;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:10px;
background:#ffff99;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,70px);
gap:10px;
}

button{
padding:15px;
font-size:1.2em;
border:none;
border-radius:10px;
cursor:pointer;
}

.number{background:#555;color:white;}
.operator{background:#f57c00;color:white;}
.equal{background:#0b8043;color:white;grid-column:span 2;}
.sci{background:#1976d2;color:white;}
.mode{background:#444;color:white;}

.history{
background:#111;
color:white;
margin-top:10px;
padding:10px;
height:120px;
overflow-y:auto;
font-size:14px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" disabled>

<div class="buttons">

<button class="mode" onclick="toggleMode()">🌙</button>
<button class="operator" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">/</button>
<button class="operator" onclick="append('*')">*</button>

<button class="sci" onclick="sqrt()">√</button>
<button class="sci" onclick="square()">x²</button>
<button class="sci" onclick="sin()">sin</button>
<button class="sci" onclick="cos()">cos</button>
<button class="operator" onclick="append('-')">-</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('+')">+</button>
<button onclick="backspace()">⌫</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="equal" onclick="calculate()">=</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>

</div>

<div class="history" id="history"></div>

</div>

<script>

const display=document.getElementById("display");
const history=document.getElementById("history");

function append(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function calculate(){
try{

let expression=display.value;

expression=expression.replace(/%/g,"/100");

let result=eval(expression);

if(result===Infinity||isNaN(result)){
display.value="Error";
return;
}

history.innerHTML+="<div>"+display.value+" = "+result+"</div>";

display.value=result;

}catch{
display.value="Error";
}
}

function backspace(){
display.value=display.value.slice(0,-1);
}

function sqrt(){
display.value=Math.sqrt(eval(display.value));
}

function square(){
display.value=Math.pow(eval(display.value),2);
}

function sin(){
display.value=Math.sin(eval(display.value));
}

function cos(){
display.value=Math.cos(eval(display.value));
}

function toggleMode(){
document.body.classList.toggle("dark");
}

document.addEventListener("keydown",function(e){

const keys="0123456789+-*/%.";

if(keys.includes(e.key)){
append(e.key);
}

else if(e.key==="Enter"){
calculate();
}

else if(e.key==="Backspace"){
backspace();
}

else if(e.key.toLowerCase()==="c"){
clearDisplay();
}

});

</script>

</body>
</html>
